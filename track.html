<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="lang-th">ตรวจสอบสถานะ</title>
    <title class="lang-ko">배송 조회</title>
    <title class="lang-en">Order Tracking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="web-container">
        <header class="navbar">
            <nav class="nav-links">
                <a href="index.html"><span class="lang-th">หน้าแรก</span><span class="lang-ko">홈</span><span class="lang-en">HOME</span></a>
                <a href="preview.html"><span class="lang-th">ทดลองอ่าน</span><span class="lang-ko">미리보기</span><span class="lang-en">PREVIEW</span></a>
                <a href="order.html"><span class="lang-th">สั่งซื้อ</span><span class="lang-ko">주문하기</span><span class="lang-en">ORDER</span></a>
                <a href="track.html" class="active"><span class="lang-th">สถานะ</span><span class="lang-ko">조회</span><span class="lang-en">TRACK</span></a>
                <a href="contact.html"><span class="lang-th">ติดต่อ</span><span class="lang-ko">문의</span><span class="lang-en">CONTACT</span></a>
            </nav>
        </header>

        <main class="main-card">
            <h2 class="section-title">
                <span class="lang-th">ตรวจสอบสถานะการสั่งซื้อ</span>
                <span class="lang-ko">주문 상태 조회</span>
                <span class="lang-en">Order Tracking</span>
            </h2>
            
            <div class="tracking-container" style="max-width: 500px; margin: 0 auto; text-align: center;">
                <input type="text" id="orderId" placeholder="กรอกหมายเลขคำสั่งซื้อ / Order ID" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px;">
                <button onclick="trackOrder()" class="btn btn-action" style="width: 100%;">
                    <span class="lang-th">ตรวจสอบ</span><span class="lang-ko">조회하기</span><span class="lang-en">TRACK</span>
                </button>
                
                <div id="result" style="margin-top: 20px; padding: 20px; border-radius: 10px; display: none;"></div>
            </div>
        </main>
    </div>

    <script>
        function trackOrder() {
            const id = document.getElementById('orderId').value;
            const resultDiv = document.getElementById('result');
            
            // 1. ใส่ URL ของ Google Script ของคุณตรงนี้ (URL ที่ลงท้ายด้วย /exec)
            const scriptUrl = "https://script.google.com/macros/s/AKfycbz2blVG1twxFGxScYe1DuYId3OachvwmoDBM4yoqV89dpVJR53dCR2oOxEpg0XoAgzqPw/exec";

            // 2. ส่งค่า ID ไปเช็กที่ Google Sheet
            fetch(scriptUrl + "?id=" + id)
            .then(res => res.json())
            .then(data => {
                resultDiv.style.display = "block";
                if(data.result === "found") {
                    resultDiv.style.backgroundColor = "#dcfce7";
                    resultDiv.innerHTML = `<h3>✅ พบข้อมูล!</h3>
                                          <p>สถานะ: พบคำสั่งซื้อ</p>
                                          <p>เลขพัสดุ: <b>${data.tracking || 'กำลังรอการจัดส่ง'}</b></p>`;
                } else {
                    resultDiv.style.backgroundColor = "#fee2e2";
                    resultDiv.innerHTML = "<h3>❌ ไม่พบข้อมูล</h3><p>กรุณาตรวจสอบหมายเลขคำสั่งซื้ออีกครั้ง</p>";
                }
            })
            .catch(err => {
                resultDiv.style.display = "block";
                resultDiv.innerHTML = "<h3>⚠️ เกิดข้อผิดพลาด</h3><p>ระบบเชื่อมต่อไม่ได้ โปรดตรวจสอบ URL หรือการ Deploy</p>";
            });
        }

        // ระบบสลับภาษา (คัดลอกมาจาก index.html เดิมของคุณ)
        const savedLang = localStorage.getItem('selectedLanguage') || 'th';
        document.querySelectorAll('.lang-th, .lang-ko, .lang-en').forEach(el => el.classList.add('lang-hidden'));
        document.querySelectorAll('.lang-' + savedLang).forEach(el => el.classList.remove('lang-hidden'));
    </script>
</body>
</html>
